name: Package Release

on:
  push:
    branches:
      - main
    paths:
      - packages/extension-sdk/**
      - packages/extension-react/**
      - packages/waggle-core/**
      - packages/pi-waggle/**
  workflow_dispatch:
    inputs:
      package_tag:
        description: Leave empty for validation, or enter one exact canonical package tag to recover a missing publish.
        required: false
        type: string
        default: ""

concurrency:
  group: package-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-please:
    name: Release Please
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
      extension_sdk_released: ${{ steps.release.outputs['packages/extension-sdk--release_created'] }}
      extension_sdk_tag: ${{ steps.release.outputs['packages/extension-sdk--tag_name'] }}
      extension_sdk_version: ${{ steps.release.outputs['packages/extension-sdk--version'] }}
      extension_sdk_sha: ${{ steps.release.outputs['packages/extension-sdk--sha'] }}
      extension_react_released: ${{ steps.release.outputs['packages/extension-react--release_created'] }}
      extension_react_tag: ${{ steps.release.outputs['packages/extension-react--tag_name'] }}
      extension_react_version: ${{ steps.release.outputs['packages/extension-react--version'] }}
      extension_react_sha: ${{ steps.release.outputs['packages/extension-react--sha'] }}
      waggle_core_released: ${{ steps.release.outputs['packages/waggle-core--release_created'] }}
      waggle_core_tag: ${{ steps.release.outputs['packages/waggle-core--tag_name'] }}
      waggle_core_version: ${{ steps.release.outputs['packages/waggle-core--version'] }}
      waggle_core_sha: ${{ steps.release.outputs['packages/waggle-core--sha'] }}
      pi_waggle_released: ${{ steps.release.outputs['packages/pi-waggle--release_created'] }}
      pi_waggle_tag: ${{ steps.release.outputs['packages/pi-waggle--tag_name'] }}
      pi_waggle_version: ${{ steps.release.outputs['packages/pi-waggle--version'] }}
      pi_waggle_sha: ${{ steps.release.outputs['packages/pi-waggle--sha'] }}
    steps:
      - name: Create or publish the coordinated package release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Validate CI for the exact release PR head
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          set -euo pipefail
          PR_NUMBER=$(jq -er '.number' <<<"$PR_JSON")
          EXPECTED_HEAD_REF=$(jq -er '.headBranchName' <<<"$PR_JSON")
          PR_DETAILS=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER")
          HEAD_REF=$(jq -er '.head.ref' <<<"$PR_DETAILS")
          HEAD_SHA=$(jq -er '.head.sha' <<<"$PR_DETAILS")

          if [ "$HEAD_REF" != "$EXPECTED_HEAD_REF" ]; then
            echo "Release Please PR head changed unexpectedly: $EXPECTED_HEAD_REF != $HEAD_REF"
            exit 1
          fi
          if [[ ! "$HEAD_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Release Please PR did not resolve to an exact commit SHA."
            exit 1
          fi

          RUN_ID=""
          for RUN_ATTEMPT in $(seq 1 12); do
            RUNS=$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs?event=pull_request&branch=${HEAD_REF}&per_page=20")
            if RUN_ID=$(jq -er --arg sha "$HEAD_SHA" \
              '.workflow_runs | map(select(.head_sha == $sha and .event == "pull_request")) | first | .id' <<<"$RUNS"); then
              break
            fi
            echo "Waiting for Release Please PR CI run (${RUN_ATTEMPT}/12)."
            sleep 5
          done

          if [ -z "$RUN_ID" ]; then
            DISPATCHED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            jq -n --arg ref "$HEAD_REF" --arg sha "$HEAD_SHA" \
              '{ref: $ref, inputs: {head_sha: $sha}}' |
              gh api --method POST \
                "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/dispatches" \
                --input -

            for DISPATCH_ATTEMPT in $(seq 1 60); do
              RUNS=$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs?event=workflow_dispatch&branch=${HEAD_REF}&per_page=20")
              if RUN_ID=$(jq -er --arg sha "$HEAD_SHA" --arg created "$DISPATCHED_AT" \
                '.workflow_runs | map(select(.head_sha == $sha and .event == "workflow_dispatch" and .created_at >= $created)) | first | .id' <<<"$RUNS"); then
                break
              fi
              echo "Waiting for dispatched Release Please PR CI (${DISPATCH_ATTEMPT}/60)."
              sleep 5
            done
          fi
          test -n "$RUN_ID"

          RUN_DETAILS=$(gh run view "$RUN_ID" --json attempt,conclusion,event,headSha,status)
          RUN_EVENT=$(jq -er '.event' <<<"$RUN_DETAILS")
          RUN_STATUS=$(jq -er '.status' <<<"$RUN_DETAILS")
          RUN_CONCLUSION=$(jq -r '.conclusion // ""' <<<"$RUN_DETAILS")
          if [ "$RUN_EVENT" != "pull_request" ] && [ "$RUN_EVENT" != "workflow_dispatch" ]; then
            echo "Unexpected Release Please CI event: $RUN_EVENT"
            exit 1
          fi
          test "$(jq -er '.headSha' <<<"$RUN_DETAILS")" = "$HEAD_SHA"

          if [ "$RUN_STATUS" = "completed" ] && [ "$RUN_CONCLUSION" = "action_required" ]; then
            PREVIOUS_ATTEMPT=$(jq -er '.attempt' <<<"$RUN_DETAILS")
            gh run rerun "$RUN_ID"
            for RERUN_ATTEMPT in $(seq 1 30); do
              CURRENT_ATTEMPT=$(gh run view "$RUN_ID" --json attempt --jq '.attempt')
              if [ "$CURRENT_ATTEMPT" -gt "$PREVIOUS_ATTEMPT" ]; then
                break
              fi
              echo "Waiting for Release Please PR CI rerun (${RERUN_ATTEMPT}/30)."
              sleep 2
            done
            test "$CURRENT_ATTEMPT" -gt "$PREVIOUS_ATTEMPT"
            gh run watch "$RUN_ID" --exit-status
          elif [ "$RUN_STATUS" != "completed" ]; then
            gh run watch "$RUN_ID" --exit-status
          elif [ "$RUN_CONCLUSION" != "success" ]; then
            echo "Release Please PR CI failed with conclusion: $RUN_CONCLUSION"
            exit 1
          fi

          FINAL_DETAILS=$(gh run view "$RUN_ID" --json conclusion,event,headSha,status)
          test "$(jq -er '.headSha' <<<"$FINAL_DETAILS")" = "$HEAD_SHA"
          test "$(jq -er '.status' <<<"$FINAL_DETAILS")" = "completed"
          FINAL_CONCLUSION=$(jq -er '.conclusion' <<<"$FINAL_DETAILS")
          test "$FINAL_CONCLUSION" = "success"

  validate-dry-run:
    name: Dry-run package release validation
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.package_tag == '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.6.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm package-release:validate

      - run: pnpm check

      - run: pnpm build:packages

  release-plan:
    name: Resolve exact package release plan
    needs: release-please
    if: >-
      ${{ always() &&
          ((github.event_name == 'push' &&
            needs.release-please.result == 'success' &&
            needs.release-please.outputs.releases_created == 'true') ||
           (github.event_name == 'workflow_dispatch' && inputs.package_tag != '')) }}
    runs-on: ubuntu-latest
    outputs:
      source_sha: ${{ steps.plan.outputs.source_sha }}
      has_bases: ${{ steps.plan.outputs.has_bases }}
      has_dependents: ${{ steps.plan.outputs.has_dependents }}
      extension_sdk_released: ${{ steps.plan.outputs.extension_sdk_released }}
      extension_sdk_tag: ${{ steps.plan.outputs.extension_sdk_tag }}
      extension_sdk_version: ${{ steps.plan.outputs.extension_sdk_version }}
      extension_react_released: ${{ steps.plan.outputs.extension_react_released }}
      extension_react_tag: ${{ steps.plan.outputs.extension_react_tag }}
      extension_react_version: ${{ steps.plan.outputs.extension_react_version }}
      waggle_core_released: ${{ steps.plan.outputs.waggle_core_released }}
      waggle_core_tag: ${{ steps.plan.outputs.waggle_core_tag }}
      waggle_core_version: ${{ steps.plan.outputs.waggle_core_version }}
      pi_waggle_released: ${{ steps.plan.outputs.pi_waggle_released }}
      pi_waggle_tag: ${{ steps.plan.outputs.pi_waggle_tag }}
      pi_waggle_version: ${{ steps.plan.outputs.pi_waggle_version }}
    steps:
      - name: Validate recovery tag shape
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          RECOVERY_TAG: ${{ inputs.package_tag }}
        run: |
          set -euo pipefail
          if [[ ! "$RECOVERY_TAG" =~ ^(extension-sdk|extension-react|waggle-core|pi-waggle)-v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Recovery requires one exact canonical stable package tag."
            exit 1
          fi

      - name: Checkout automatic release commit
        if: ${{ github.event_name == 'push' }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout recovery tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: refs/tags/${{ inputs.package_tag }}
          fetch-depth: 0
          fetch-tags: true

      - name: Validate tags, versions, paths, and source SHA
        id: plan
        env:
          EVENT_NAME: ${{ github.event_name }}
          RECOVERY_TAG: ${{ inputs.package_tag }}
          PATHS_RELEASED: ${{ needs.release-please.outputs.paths_released }}
          SDK_RELEASED: ${{ needs.release-please.outputs.extension_sdk_released }}
          SDK_TAG: ${{ needs.release-please.outputs.extension_sdk_tag }}
          SDK_VERSION: ${{ needs.release-please.outputs.extension_sdk_version }}
          SDK_SHA: ${{ needs.release-please.outputs.extension_sdk_sha }}
          REACT_RELEASED: ${{ needs.release-please.outputs.extension_react_released }}
          REACT_TAG: ${{ needs.release-please.outputs.extension_react_tag }}
          REACT_VERSION: ${{ needs.release-please.outputs.extension_react_version }}
          REACT_SHA: ${{ needs.release-please.outputs.extension_react_sha }}
          CORE_RELEASED: ${{ needs.release-please.outputs.waggle_core_released }}
          CORE_TAG: ${{ needs.release-please.outputs.waggle_core_tag }}
          CORE_VERSION: ${{ needs.release-please.outputs.waggle_core_version }}
          CORE_SHA: ${{ needs.release-please.outputs.waggle_core_sha }}
          PI_RELEASED: ${{ needs.release-please.outputs.pi_waggle_released }}
          PI_TAG: ${{ needs.release-please.outputs.pi_waggle_tag }}
          PI_VERSION: ${{ needs.release-please.outputs.pi_waggle_version }}
          PI_SHA: ${{ needs.release-please.outputs.pi_waggle_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          keys=(extension_sdk extension_react waggle_core pi_waggle)
          declare -A paths=(
            [extension_sdk]="packages/extension-sdk"
            [extension_react]="packages/extension-react"
            [waggle_core]="packages/waggle-core"
            [pi_waggle]="packages/pi-waggle"
          )
          declare -A components=(
            [extension_sdk]="extension-sdk"
            [extension_react]="extension-react"
            [waggle_core]="waggle-core"
            [pi_waggle]="pi-waggle"
          )
          declare -A names=(
            [extension_sdk]="@openwaggle/extension-sdk"
            [extension_react]="@openwaggle/extension-react"
            [waggle_core]="@openwaggle/waggle-core"
            [pi_waggle]="@openwaggle/pi-waggle"
          )
          declare -A released=(
            [extension_sdk]="${SDK_RELEASED:-false}"
            [extension_react]="${REACT_RELEASED:-false}"
            [waggle_core]="${CORE_RELEASED:-false}"
            [pi_waggle]="${PI_RELEASED:-false}"
          )
          declare -A tags=(
            [extension_sdk]="${SDK_TAG:-}"
            [extension_react]="${REACT_TAG:-}"
            [waggle_core]="${CORE_TAG:-}"
            [pi_waggle]="${PI_TAG:-}"
          )
          declare -A versions=(
            [extension_sdk]="${SDK_VERSION:-}"
            [extension_react]="${REACT_VERSION:-}"
            [waggle_core]="${CORE_VERSION:-}"
            [pi_waggle]="${PI_VERSION:-}"
          )
          declare -A shas=(
            [extension_sdk]="${SDK_SHA:-}"
            [extension_react]="${REACT_SHA:-}"
            [waggle_core]="${CORE_SHA:-}"
            [pi_waggle]="${PI_SHA:-}"
          )

          SOURCE_SHA=$(git rev-parse HEAD)
          if [[ ! "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Checked out source is not an exact commit SHA."
            exit 1
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG_SHA=$(git rev-parse "refs/tags/${RECOVERY_TAG}^{commit}")
            REMOTE_TAG_SHA=$(git ls-remote --exit-code origin "refs/tags/$RECOVERY_TAG" | awk '{print $1}')
            if [ "$TAG_SHA" != "$SOURCE_SHA" ] || [ "$REMOTE_TAG_SHA" != "$SOURCE_SHA" ]; then
              echo "Recovery tag does not resolve to the exact GitHub source commit."
              exit 1
            fi
          fi

          if [ "$EVENT_NAME" = "push" ]; then
            if [ "$SOURCE_SHA" != "$GITHUB_SHA" ]; then
              echo "Automatic release checkout does not match the triggering main commit."
              exit 1
            fi
            if ! jq -e 'type == "array"' <<<"$PATHS_RELEASED" >/dev/null; then
              echo "Release Please paths_released output is not a JSON array."
              exit 1
            fi
            while IFS= read -r released_path; do
              case "$released_path" in
                packages/extension-sdk|packages/extension-react|packages/waggle-core|packages/pi-waggle) ;;
                *)
                  echo "Release Please reported unexpected path: $released_path"
                  exit 1
                  ;;
              esac
            done < <(jq -r '.[]' <<<"$PATHS_RELEASED")
          else
            if [[ ! "$RECOVERY_TAG" =~ ^(extension-sdk|extension-react|waggle-core|pi-waggle)-v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
              echo "Recovery tag changed after validation."
              exit 1
            fi
            RECOVERY_COMPONENT="${BASH_REMATCH[1]}"
            RECOVERY_VERSION="${BASH_REMATCH[2]}.${BASH_REMATCH[3]}.${BASH_REMATCH[4]}"
            for key in "${keys[@]}"; do
              released[$key]=false
              tags[$key]=""
              versions[$key]=""
              shas[$key]=""
              if [ "${components[$key]}" = "$RECOVERY_COMPONENT" ]; then
                released[$key]=true
                tags[$key]="$RECOVERY_TAG"
                versions[$key]="$RECOVERY_VERSION"
                shas[$key]="$SOURCE_SHA"
              fi
            done
          fi

          HAS_BASES=false
          HAS_DEPENDENTS=false
          RELEASE_COUNT=0
          for key in "${keys[@]}"; do
            path="${paths[$key]}"
            component="${components[$key]}"
            package_name="${names[$key]}"
            is_released="${released[$key]}"

            if [ "$is_released" != "true" ] && [ "$is_released" != "false" ]; then
              echo "Invalid release_created output for $path: $is_released"
              exit 1
            fi

            if [ "$EVENT_NAME" = "push" ]; then
              path_was_released=$(jq -r --arg path "$path" 'index($path) != null' <<<"$PATHS_RELEASED")
              if [ "$path_was_released" != "$is_released" ]; then
                echo "paths_released disagrees with release_created for $path."
                exit 1
              fi
            fi

            if [ "$is_released" = "true" ]; then
              tag="${tags[$key]}"
              version="${versions[$key]}"
              release_sha="${shas[$key]}"
              if [[ ! "$version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
                echo "Release version for $path is not stable semver: $version"
                exit 1
              fi
              if [[ "$version" =~ ^0\.0\. ]]; then
                echo "Real package releases must begin at 0.1.0."
                exit 1
              fi
              if [ "$tag" != "$component-v$version" ]; then
                echo "Canonical tag mismatch for $path: $tag"
                exit 1
              fi
              if [ "$release_sha" != "$SOURCE_SHA" ]; then
                echo "Release tag SHA does not match the exact source commit for $path."
                exit 1
              fi
              if [ "$(git rev-parse "refs/tags/${tag}^{commit}")" != "$SOURCE_SHA" ]; then
                echo "Tag $tag does not resolve to the exact source commit."
                exit 1
              fi
              REMOTE_TAG_SHA=$(git ls-remote --exit-code origin "refs/tags/$tag" | awk '{print $1}')
              if [ "$REMOTE_TAG_SHA" != "$SOURCE_SHA" ]; then
                echo "Remote tag $tag does not resolve to the exact source commit."
                exit 1
              fi

              RELEASE_JSON=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$tag")
              if ! jq -e \
                --arg tag "$tag" \
                '.tag_name == $tag and .draft == false and .prerelease == false and (.published_at | type == "string")' \
                <<<"$RELEASE_JSON" >/dev/null; then
                echo "GitHub Release for $tag is missing, unpublished, draft, prerelease, or mismatched."
                exit 1
              fi

              actual_name=$(node -p "require('./$path/package.json').name")
              actual_version=$(node -p "require('./$path/package.json').version")
              if [ "$actual_name" != "$package_name" ] || [ "$actual_version" != "$version" ]; then
                echo "Source metadata does not match $tag."
                exit 1
              fi

              RELEASE_COUNT=$((RELEASE_COUNT + 1))
              case "$key" in
                extension_sdk|waggle_core) HAS_BASES=true ;;
                extension_react|pi_waggle) HAS_DEPENDENTS=true ;;
              esac
              echo "${key}_tag=$tag" >>"$GITHUB_OUTPUT"
              echo "${key}_version=$version" >>"$GITHUB_OUTPUT"
            else
              echo "${key}_tag=" >>"$GITHUB_OUTPUT"
              echo "${key}_version=" >>"$GITHUB_OUTPUT"
            fi
            echo "${key}_released=$is_released" >>"$GITHUB_OUTPUT"
          done

          if [ "$RELEASE_COUNT" -eq 0 ]; then
            echo "Release plan contains no packages."
            exit 1
          fi
          echo "source_sha=$SOURCE_SHA" >>"$GITHUB_OUTPUT"
          echo "has_bases=$HAS_BASES" >>"$GITHUB_OUTPUT"
          echo "has_dependents=$HAS_DEPENDENTS" >>"$GITHUB_OUTPUT"

  release-qa:
    name: Package release QA (Node ${{ matrix.node }})
    needs: release-plan
    if: ${{ always() && needs.release-plan.result == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - 22.19.0
          - 24
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.release-plan.outputs.source_sha }}

      - name: Checkout immutable package consumer tooling
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.workflow_sha }}
          path: .release-tooling
          sparse-checkout: scripts/package-consumer-tools.ts
          sparse-checkout-cone-mode: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.6.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - run: pnpm install --frozen-lockfile

      - name: Install pinned package manager consumers
        run: node .release-tooling/scripts/package-consumer-tools.ts install --tool-root "$RUNNER_TEMP/package-managers" --github-path "$GITHUB_PATH"

      - name: Verify package manager consumer versions
        run: node .release-tooling/scripts/package-consumer-tools.ts verify --tool-root "$RUNNER_TEMP/package-managers"

      - name: Run full release checks on Node 24
        if: ${{ matrix.node == 24 }}
        run: pnpm check

      - name: Install Chromium for package browser smoke
        run: pnpm exec playwright install chromium

      - name: Smoke packed consumers
        env:
          OPENWAGGLE_PACKAGE_BROWSER_SMOKE: '1'
          OPENWAGGLE_PACKAGE_SMOKE_REQUIRED_MANAGERS: 'npm,pnpm,yarn,bun'
        run: pnpm build:packages && pnpm package:smoke

  prepare-artifacts:
    name: Build exact package tarballs
    needs:
      - release-plan
      - release-qa
    if: ${{ always() && needs.release-plan.result == 'success' && needs.release-qa.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.release-plan.outputs.source_sha }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.6.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Pin trusted-publishing npm CLI
        run: npm install --global npm@11.18.0

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:packages

      - name: Pack and validate exact release tarballs
        env:
          SOURCE_SHA: ${{ needs.release-plan.outputs.source_sha }}
          SDK_RELEASED: ${{ needs.release-plan.outputs.extension_sdk_released }}
          SDK_TAG: ${{ needs.release-plan.outputs.extension_sdk_tag }}
          SDK_VERSION: ${{ needs.release-plan.outputs.extension_sdk_version }}
          REACT_RELEASED: ${{ needs.release-plan.outputs.extension_react_released }}
          REACT_TAG: ${{ needs.release-plan.outputs.extension_react_tag }}
          REACT_VERSION: ${{ needs.release-plan.outputs.extension_react_version }}
          CORE_RELEASED: ${{ needs.release-plan.outputs.waggle_core_released }}
          CORE_TAG: ${{ needs.release-plan.outputs.waggle_core_tag }}
          CORE_VERSION: ${{ needs.release-plan.outputs.waggle_core_version }}
          PI_RELEASED: ${{ needs.release-plan.outputs.pi_waggle_released }}
          PI_TAG: ${{ needs.release-plan.outputs.pi_waggle_tag }}
          PI_VERSION: ${{ needs.release-plan.outputs.pi_waggle_version }}
        run: |
          set -euo pipefail
          ARTIFACT_ROOT="$RUNNER_TEMP/package-release-artifacts"
          mkdir -p "$ARTIFACT_ROOT"

          pack_release() {
            local key="$1"
            local package_path="$2"
            local package_name="$3"
            local component="$4"
            local released="$5"
            local tag="$6"
            local version="$7"
            if [ "$released" != "true" ]; then
              return
            fi

            local output_dir="$ARTIFACT_ROOT/$key"
            local pack_result="$RUNNER_TEMP/$key-pack.json"
            mkdir -p "$output_dir"
            pnpm --dir "$package_path" pack --pack-destination "$output_dir" --json >"$pack_result"
            local tarball
            tarball=$(jq -er 'if type == "array" then .[0].filename else .filename end' "$pack_result")
            if [[ "$tarball" != /* ]]; then
              tarball="$package_path/$tarball"
            fi
            tarball=$(realpath "$tarball")
            case "$tarball" in
              "$output_dir"/*.tgz) ;;
              *)
                echo "pnpm pack returned an unexpected tarball path: $tarball"
                exit 1
                ;;
            esac

            local packed_manifest="$output_dir/package.json"
            tar -xOf "$tarball" package/package.json >"$packed_manifest"
            jq -e \
              --arg name "$package_name" \
              --arg version "$version" \
              '.name == $name and
               .version == $version and
               .publishConfig.access == "public" and
               .repository.url == "https://github.com/OpenWaggle/OpenWaggle.git"' \
              "$packed_manifest" >/dev/null
            if jq -e '.. | strings | select(startswith("workspace:"))' "$packed_manifest" >/dev/null; then
              echo "$package_name tarball contains a workspace protocol."
              exit 1
            fi
            if [ "$tag" != "$component-v$version" ]; then
              echo "$package_name tarball does not match its canonical tag."
              exit 1
            fi

            while IFS= read -r entry; do
              case "$entry" in
                package/|package/dist/|package/dist-cjs/|package/package.json|package/README.md|package/CHANGELOG.md|package/LICENSE|package/styles.css) ;;
                package/dist/*|package/dist-cjs/*)
                  if [[ "$entry" == *.map ]]; then
                    echo "Source map is not allowed in release tarball: $entry"
                    exit 1
                  fi
                  ;;
                *)
                  echo "Unexpected release tarball entry: $entry"
                  exit 1
                  ;;
              esac
            done < <(tar -tf "$tarball")

            (
              cd "$output_dir"
              sha256sum "$(basename "$tarball")" >SHA256SUMS
            )
            jq -n \
              --arg name "$package_name" \
              --arg version "$version" \
              --arg tag "$tag" \
              --arg source_sha "$SOURCE_SHA" \
              '{name: $name, version: $version, tag: $tag, source_sha: $source_sha}' \
              >"$output_dir/release-metadata.json"
          }

          pack_release extension-sdk packages/extension-sdk @openwaggle/extension-sdk extension-sdk "$SDK_RELEASED" "$SDK_TAG" "$SDK_VERSION"
          pack_release extension-react packages/extension-react @openwaggle/extension-react extension-react "$REACT_RELEASED" "$REACT_TAG" "$REACT_VERSION"
          pack_release waggle-core packages/waggle-core @openwaggle/waggle-core waggle-core "$CORE_RELEASED" "$CORE_TAG" "$CORE_VERSION"
          pack_release pi-waggle packages/pi-waggle @openwaggle/pi-waggle pi-waggle "$PI_RELEASED" "$PI_TAG" "$PI_VERSION"

      - name: Upload immutable validated tarballs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: package-release-${{ needs.release-plan.outputs.source_sha }}
          path: ${{ runner.temp }}/package-release-artifacts
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  publish-bases:
    name: Publish base package (${{ matrix.name }})
    needs:
      - release-plan
      - prepare-artifacts
    if: ${{ always() && needs.release-plan.result == 'success' && needs.prepare-artifacts.result == 'success' && needs.release-plan.outputs.has_bases == 'true' }}
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: extension-sdk
            name: "@openwaggle/extension-sdk"
            released: ${{ needs.release-plan.outputs.extension_sdk_released }}
            tag: ${{ needs.release-plan.outputs.extension_sdk_tag }}
            version: ${{ needs.release-plan.outputs.extension_sdk_version }}
          - key: waggle-core
            name: "@openwaggle/waggle-core"
            released: ${{ needs.release-plan.outputs.waggle_core_released }}
            tag: ${{ needs.release-plan.outputs.waggle_core_tag }}
            version: ${{ needs.release-plan.outputs.waggle_core_version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        if: ${{ matrix.released == 'true' }}
        with:
          ref: ${{ needs.release-plan.outputs.source_sha }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        if: ${{ matrix.released == 'true' }}
        with:
          node-version: 24.14.0
          package-manager-cache: false

      - name: Verify trusted-publishing npm version
        if: ${{ matrix.released == 'true' }}
        run: test "$(npm --version)" = "11.9.0"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        if: ${{ matrix.released == 'true' }}
        with:
          name: package-release-${{ needs.release-plan.outputs.source_sha }}
          path: ${{ runner.temp }}/package-release-artifacts

      - name: Revalidate exact tarball artifact
        if: ${{ matrix.released == 'true' }}
        id: artifact
        env:
          PACKAGE_NAME: ${{ matrix.name }}
          PACKAGE_VERSION: ${{ matrix.version }}
          PACKAGE_TAG: ${{ matrix.tag }}
          SOURCE_SHA: ${{ needs.release-plan.outputs.source_sha }}
        run: |
          set -euo pipefail
          ARTIFACT_DIR="$RUNNER_TEMP/package-release-artifacts/${{ matrix.key }}"
          mapfile -t TARBALLS < <(find "$ARTIFACT_DIR" -maxdepth 1 -type f -name '*.tgz' -print)
          if [ "${#TARBALLS[@]}" -ne 1 ]; then
            echo "Expected exactly one tarball for $PACKAGE_NAME."
            exit 1
          fi
          TARBALL="${TARBALLS[0]}"
          (cd "$ARTIFACT_DIR" && sha256sum --check SHA256SUMS)
          tar -xOf "$TARBALL" package/package.json >"$RUNNER_TEMP/packed-package.json"
          jq -e --arg name "$PACKAGE_NAME" --arg version "$PACKAGE_VERSION" \
            '.name == $name and .version == $version and .publishConfig.access == "public"' \
            "$RUNNER_TEMP/packed-package.json" >/dev/null
          jq -e --arg name "$PACKAGE_NAME" --arg version "$PACKAGE_VERSION" --arg tag "$PACKAGE_TAG" --arg sha "$SOURCE_SHA" \
            '.name == $name and .version == $version and .tag == $tag and .source_sha == $sha' \
            "$ARTIFACT_DIR/release-metadata.json" >/dev/null
          echo "tarball=$TARBALL" >>"$GITHUB_OUTPUT"

      - name: Verify unpublished registry state and OIDC gate
        if: ${{ matrix.released == 'true' }}
        env:
          PACKAGE_NAME: ${{ matrix.name }}
          PACKAGE_VERSION: ${{ matrix.version }}
          PACKAGE_TAG: ${{ matrix.tag }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            if [ "$GITHUB_REF" != "refs/heads/main" ]; then
              echo "Automatic publishing is allowed only from main."
              exit 1
            fi
          elif [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "${{ inputs.package_tag }}" != "$PACKAGE_TAG" ]; then
              echo "Recovery tag no longer matches the planned package."
              exit 1
            fi
          else
            echo "Unsupported package publication event."
            exit 1
          fi
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "GitHub OIDC token request environment is unavailable."
            exit 1
          fi
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version --json >"$RUNNER_TEMP/npm-view.out" 2>"$RUNNER_TEMP/npm-view.err"; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published."
            exit 1
          fi
          if ! grep -Eq 'E404|404 Not Found' "$RUNNER_TEMP/npm-view.err"; then
            cat "$RUNNER_TEMP/npm-view.err"
            exit 1
          fi

      - name: Publish exact validated tarball with npm Trusted Publishing
        if: ${{ matrix.released == 'true' }}
        env:
          TARBALL: ${{ steps.artifact.outputs.tarball }}
        run: node scripts/package-release-publish.ts "$TARBALL"

      - name: Verify published version
        if: ${{ matrix.released == 'true' }}
        env:
          PACKAGE_NAME: ${{ matrix.name }}
          PACKAGE_VERSION: ${{ matrix.version }}
        run: |
          set -euo pipefail
          for attempt in {1..12}; do
            if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version --json >"$RUNNER_TEMP/published-version.json" 2>/dev/null &&
              jq -e --arg version "$PACKAGE_VERSION" '. == $version' "$RUNNER_TEMP/published-version.json" >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "$PACKAGE_NAME@$PACKAGE_VERSION did not become readable from npm."
          exit 1

  publish-dependents:
    name: Publish dependent package (${{ matrix.name }})
    needs:
      - release-plan
      - prepare-artifacts
      - publish-bases
    if: >-
      ${{ always() &&
          needs.release-plan.result == 'success' &&
          needs.prepare-artifacts.result == 'success' &&
          (needs.publish-bases.result == 'success' || needs.publish-bases.result == 'skipped') &&
          needs.release-plan.outputs.has_dependents == 'true' }}
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: extension-react
            name: "@openwaggle/extension-react"
            dependency_name: "@openwaggle/extension-sdk"
            released: ${{ needs.release-plan.outputs.extension_react_released }}
            tag: ${{ needs.release-plan.outputs.extension_react_tag }}
            version: ${{ needs.release-plan.outputs.extension_react_version }}
          - key: pi-waggle
            name: "@openwaggle/pi-waggle"
            dependency_name: "@openwaggle/waggle-core"
            released: ${{ needs.release-plan.outputs.pi_waggle_released }}
            tag: ${{ needs.release-plan.outputs.pi_waggle_tag }}
            version: ${{ needs.release-plan.outputs.pi_waggle_version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        if: ${{ matrix.released == 'true' }}
        with:
          ref: ${{ needs.release-plan.outputs.source_sha }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        if: ${{ matrix.released == 'true' }}
        with:
          node-version: 24.14.0
          package-manager-cache: false

      - name: Verify trusted-publishing npm version
        if: ${{ matrix.released == 'true' }}
        run: test "$(npm --version)" = "11.9.0"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        if: ${{ matrix.released == 'true' }}
        with:
          name: package-release-${{ needs.release-plan.outputs.source_sha }}
          path: ${{ runner.temp }}/package-release-artifacts

      - name: Revalidate exact tarball and dependency
        if: ${{ matrix.released == 'true' }}
        id: artifact
        env:
          PACKAGE_NAME: ${{ matrix.name }}
          PACKAGE_VERSION: ${{ matrix.version }}
          PACKAGE_TAG: ${{ matrix.tag }}
          DEPENDENCY_NAME: ${{ matrix.dependency_name }}
          SOURCE_SHA: ${{ needs.release-plan.outputs.source_sha }}
        run: |
          set -euo pipefail
          ARTIFACT_DIR="$RUNNER_TEMP/package-release-artifacts/${{ matrix.key }}"
          mapfile -t TARBALLS < <(find "$ARTIFACT_DIR" -maxdepth 1 -type f -name '*.tgz' -print)
          if [ "${#TARBALLS[@]}" -ne 1 ]; then
            echo "Expected exactly one tarball for $PACKAGE_NAME."
            exit 1
          fi
          TARBALL="${TARBALLS[0]}"
          (cd "$ARTIFACT_DIR" && sha256sum --check SHA256SUMS)
          tar -xOf "$TARBALL" package/package.json >"$RUNNER_TEMP/packed-package.json"
          jq -e --arg name "$PACKAGE_NAME" --arg version "$PACKAGE_VERSION" \
            '.name == $name and .version == $version and .publishConfig.access == "public"' \
            "$RUNNER_TEMP/packed-package.json" >/dev/null
          jq -e --arg name "$PACKAGE_NAME" --arg version "$PACKAGE_VERSION" --arg tag "$PACKAGE_TAG" --arg sha "$SOURCE_SHA" \
            '.name == $name and .version == $version and .tag == $tag and .source_sha == $sha' \
            "$ARTIFACT_DIR/release-metadata.json" >/dev/null

          DEPENDENCY_RANGE=$(jq -er --arg name "$DEPENDENCY_NAME" '.dependencies[$name]' "$RUNNER_TEMP/packed-package.json")
          if [[ ! "$DEPENDENCY_RANGE" =~ ^\^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "$PACKAGE_NAME must publish an exact caret range for $DEPENDENCY_NAME."
            exit 1
          fi
          DEPENDENCY_VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
          if ! npm view "$DEPENDENCY_NAME@$DEPENDENCY_VERSION" version --json >"$RUNNER_TEMP/dependency-version.json"; then
            echo "$DEPENDENCY_NAME@$DEPENDENCY_VERSION is not available for $PACKAGE_NAME."
            exit 1
          fi
          if ! jq -e --arg version "$DEPENDENCY_VERSION" '. == $version' "$RUNNER_TEMP/dependency-version.json" >/dev/null; then
            echo "npm returned the wrong dependency version for $DEPENDENCY_NAME."
            exit 1
          fi
          echo "tarball=$TARBALL" >>"$GITHUB_OUTPUT"

      - name: Verify unpublished registry state and OIDC gate
        if: ${{ matrix.released == 'true' }}
        env:
          PACKAGE_NAME: ${{ matrix.name }}
          PACKAGE_VERSION: ${{ matrix.version }}
          PACKAGE_TAG: ${{ matrix.tag }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            if [ "$GITHUB_REF" != "refs/heads/main" ]; then
              echo "Automatic publishing is allowed only from main."
              exit 1
            fi
          elif [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "${{ inputs.package_tag }}" != "$PACKAGE_TAG" ]; then
              echo "Recovery tag no longer matches the planned package."
              exit 1
            fi
          else
            echo "Unsupported package publication event."
            exit 1
          fi
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "GitHub OIDC token request environment is unavailable."
            exit 1
          fi
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version --json >"$RUNNER_TEMP/npm-view.out" 2>"$RUNNER_TEMP/npm-view.err"; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published."
            exit 1
          fi
          if ! grep -Eq 'E404|404 Not Found' "$RUNNER_TEMP/npm-view.err"; then
            cat "$RUNNER_TEMP/npm-view.err"
            exit 1
          fi

      - name: Publish exact validated tarball with npm Trusted Publishing
        if: ${{ matrix.released == 'true' }}
        env:
          TARBALL: ${{ steps.artifact.outputs.tarball }}
        run: node scripts/package-release-publish.ts "$TARBALL"

      - name: Verify published version
        if: ${{ matrix.released == 'true' }}
        env:
          PACKAGE_NAME: ${{ matrix.name }}
          PACKAGE_VERSION: ${{ matrix.version }}
        run: |
          set -euo pipefail
          for attempt in {1..12}; do
            if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version --json >"$RUNNER_TEMP/published-version.json" 2>/dev/null &&
              jq -e --arg version "$PACKAGE_VERSION" '. == $version' "$RUNNER_TEMP/published-version.json" >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "$PACKAGE_NAME@$PACKAGE_VERSION did not become readable from npm."
          exit 1

  verify-release-outcome:
    name: Verify package release outcome
    needs:
      - release-plan
      - release-qa
      - prepare-artifacts
      - publish-bases
      - publish-dependents
    if: ${{ always() && needs.release-plan.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fail closed on skipped or failed release jobs
        env:
          HAS_BASES: ${{ needs.release-plan.outputs.has_bases }}
          HAS_DEPENDENTS: ${{ needs.release-plan.outputs.has_dependents }}
          RELEASE_QA_RESULT: ${{ needs.release-qa.result }}
          PREPARE_ARTIFACTS_RESULT: ${{ needs.prepare-artifacts.result }}
          PUBLISH_BASES_RESULT: ${{ needs.publish-bases.result }}
          PUBLISH_DEPENDENTS_RESULT: ${{ needs.publish-dependents.result }}
        run: |
          set -euo pipefail
          case "$HAS_BASES" in
            true|false) ;;
            *) echo "Invalid has_bases release-plan output: $HAS_BASES"; exit 1 ;;
          esac
          case "$HAS_DEPENDENTS" in
            true|false) ;;
            *) echo "Invalid has_dependents release-plan output: $HAS_DEPENDENTS"; exit 1 ;;
          esac
          if [ "$HAS_BASES" != "true" ] && [ "$HAS_DEPENDENTS" != "true" ]; then
            echo "Release plan did not select a package family."
            exit 1
          fi

          test "$RELEASE_QA_RESULT" = "success"
          test "$PREPARE_ARTIFACTS_RESULT" = "success"

          if [ "$HAS_BASES" = "true" ]; then
            test "$PUBLISH_BASES_RESULT" = "success"
          else
            test "$PUBLISH_BASES_RESULT" = "skipped"
          fi

          if [ "$HAS_DEPENDENTS" = "true" ]; then
            test "$PUBLISH_DEPENDENTS_RESULT" = "success"
          else
            test "$PUBLISH_DEPENDENTS_RESULT" = "skipped"
          fi

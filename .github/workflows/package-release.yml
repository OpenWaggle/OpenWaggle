name: Package Release

on:
  push:
    branches:
      - main
    paths:
      - packages/extension-sdk/**
      - packages/extension-react/**
      - packages/waggle-core/**
      - packages/pi-waggle/**

concurrency:
  group: package-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-please:
    name: Maintain coordinated package release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Create or update the coordinated package release PR
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: true

  release-plan:
    name: Detect merged package versions
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.plan.outputs.artifact_name }}
      has_release: ${{ steps.plan.outputs.has_release }}
      source_tree: ${{ steps.plan.outputs.source_tree }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Resolve exact merged package plan
        id: plan
        run: node --disable-warning=MODULE_TYPELESS_PACKAGE_JSON scripts/package-release-plan.ts "${{ github.event.before }}" "${{ github.sha }}" "$RUNNER_TEMP/package-release-plan.json"


  publish:
    name: Promote attested package artifacts
    needs:
      - release-please
      - release-plan
    if: ${{ needs.release-plan.outputs.has_release == 'true' }}
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      actions: read
      attestations: read
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.14.0
          package-manager-cache: false

      - name: Install and verify pinned trusted-publishing npm
        run: |
          npm install --global npm@11.18.0
          test "$(npm --version)" = "11.18.0"

      - name: Recreate exact merged package plan
        run: node --disable-warning=MODULE_TYPELESS_PACKAGE_JSON scripts/package-release-plan.ts "${{ github.event.before }}" "${{ github.sha }}" "$RUNNER_TEMP/package-release-plan.json"

      - name: Locate successful Release Please PR artifacts
        id: artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: node --disable-warning=MODULE_TYPELESS_PACKAGE_JSON scripts/package-release-artifact-locator.ts "${{ needs.release-plan.outputs.source_tree }}"

      - name: Download exact attested Release Please PR artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: ${{ runner.temp }}/package-release-artifacts
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.artifact.outputs.run_id }}

      - name: Verify identity, resume npm publication, then create immutable releases
        env:
          EXPECTED_ARTIFACT_SOURCE_SHA: ${{ steps.artifact.outputs.source_sha }}
          GH_TOKEN: ${{ github.token }}
        run: node --disable-warning=MODULE_TYPELESS_PACKAGE_JSON scripts/package-release-promote.ts "$RUNNER_TEMP/package-release-plan.json" "$RUNNER_TEMP/package-release-artifacts"

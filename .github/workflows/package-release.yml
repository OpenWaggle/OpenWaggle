name: Package Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Validate the package release workflow without staging or publishing.
        required: true
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: package-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-dry-run:
    name: Dry-run package release validation
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Enforce dry-run-only manual dispatch
        run: |
          set -euo pipefail
          if [ "${{ inputs.dry_run }}" != "true" ]; then
            echo "Manual package release workflow runs are validation-only."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm package-release:validate

      - run: pnpm check

      - run: pnpm build:packages

      - name: Pack packages without staging
        run: |
          set -euo pipefail
          pnpm --filter @openwaggle/extension-sdk pack:check
          pnpm --filter @openwaggle/extension-react pack:check
          pnpm --filter @openwaggle/waggle-core pack:check
          pnpm --filter @openwaggle/pi-waggle pack:check

  release-please:
    name: Release Please
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  stage-packages:
    name: Stage npm packages
    needs: release-please
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_name: "@openwaggle/extension-sdk"
            package_path: packages/extension-sdk
          - package_name: "@openwaggle/extension-react"
            package_path: packages/extension-react
          - package_name: "@openwaggle/waggle-core"
            package_path: packages/waggle-core
          - package_name: "@openwaggle/pi-waggle"
            package_path: packages/pi-waggle
    steps:
      - uses: actions/checkout@v4
        if: ${{ contains(fromJSON(needs.release-please.outputs.paths_released), matrix.package_path) }}

      - uses: pnpm/action-setup@v4
        if: ${{ contains(fromJSON(needs.release-please.outputs.paths_released), matrix.package_path) }}

      - uses: actions/setup-node@v4
        if: ${{ contains(fromJSON(needs.release-please.outputs.paths_released), matrix.package_path) }}
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install npm CLI with staged publishing support
        if: ${{ contains(fromJSON(needs.release-please.outputs.paths_released), matrix.package_path) }}
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile
        if: ${{ contains(fromJSON(needs.release-please.outputs.paths_released), matrix.package_path) }}

      - run: pnpm package-release:validate
        if: ${{ contains(fromJSON(needs.release-please.outputs.paths_released), matrix.package_path) }}

      - run: pnpm check
        if: ${{ contains(fromJSON(needs.release-please.outputs.paths_released), matrix.package_path) }}

      - run: pnpm build:packages
        if: ${{ contains(fromJSON(needs.release-please.outputs.paths_released), matrix.package_path) }}

      - name: Pack release package
        if: ${{ contains(fromJSON(needs.release-please.outputs.paths_released), matrix.package_path) }}
        run: pnpm --filter "${{ matrix.package_name }}" pack:check

      - name: Verify trusted publishing gate
        if: ${{ contains(fromJSON(needs.release-please.outputs.paths_released), matrix.package_path) }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "push" ] || [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "Real package staging is allowed only from main push release runs."
            exit 1
          fi
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "GitHub OIDC token request environment is unavailable."
            exit 1
          fi
          case "${{ matrix.package_name }}" in
            @openwaggle/*) ;;
            *)
              echo "Package must publish under the @openwaggle npm scope."
              exit 1
              ;;
          esac

      - name: Verify package version is unpublished
        if: ${{ contains(fromJSON(needs.release-please.outputs.paths_released), matrix.package_path) }}
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(node -p "require('./${{ matrix.package_path }}/package.json').version")
          if npm view "${{ matrix.package_name }}@${PACKAGE_VERSION}" version --registry https://registry.npmjs.org >/tmp/npm-view.out 2>/tmp/npm-view.err; then
            echo "${{ matrix.package_name }}@${PACKAGE_VERSION} is already published."
            exit 1
          fi
          if ! grep -q "E404" /tmp/npm-view.err; then
            cat /tmp/npm-view.err
            exit 1
          fi

      - name: Stage package for npm maintainer approval
        if: ${{ contains(fromJSON(needs.release-please.outputs.paths_released), matrix.package_path) }}
        working-directory: ${{ matrix.package_path }}
        run: npm stage publish --access public
